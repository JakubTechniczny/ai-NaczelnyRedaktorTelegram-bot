name: Daily News Bot

on:
  schedule:
    # Ustawiamy 08:05 UTC (co daje 10:05 w Polsce)
    # Dodajemy 5 minut zapasu, aby ominąć kolejki
    - cron: '5 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance
    
      - name: Run bot
        # Upewnij się, że poniższe linie mają dokładnie takie wcięcia (2 spacje)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
